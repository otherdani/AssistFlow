version: '3.8'

services:
  # ── IT Support App ─────────────────────────────────────────────────────────
  app:
    build: .
    container_name: assist-flow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      SESSION_SECRET: "" # a random long string
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ""
      SQL_SERVER: sqlserver
      SQL_PORT: "1433"
      SQL_DATABASE: ITSupport
      SQL_USER: sa
      SQL_PASSWORD: "" # same as below
      SQL_ENCRYPT: "false"
      SQL_TRUST_CERT: "true"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ── Microsoft SQL Server 2022 ─────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: assist-flow-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "" # same password as sql
      MSSQL_MEMORY_LIMIT_MB: 700
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:                                                              # | make sure you put password there
      # Using single quotes keeps the bash interpreter from choking on the exc- ˇ -lamation point in the password
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '' -Q 'SELECT 1' -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  sqldata:
