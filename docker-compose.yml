version: '3.8'

services:
  # ── IT Support App ─────────────────────────────────────────────────────────
  app:
    build: .
    container_name: assist-flow
    restart: unless-stopped
    ports:
      - "${PORT}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      SESSION_SECRET: "${SESSION_SECRET}" # a random long string
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SQL_SERVER: sqlserver
      SQL_PORT: "${SQL_PORT}"
      SQL_DATABASE: "${SQL_DATABASE}"
      SQL_USER: "${SQL_USER}"
      SQL_PASSWORD: "${SQL_PASSWORD}" # same as below
      SQL_ENCRYPT: "${SQL_ENCRYPT}"
      SQL_TRUST_CERT: "${SQL_TRUST_CERT}"
    depends_on:
      sqlserver:
        condition: service_healthy

  # ── Microsoft SQL Server 2022 ─────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: assist-flow-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}" # same password as sql
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:                                                              # | make sure you put password there
      # Using single quotes keeps the bash interpreter from choking on the exc- ˇ -lamation point in the password
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_PASSWORD}' -Q 'SELECT 1' -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30          # Emeljük meg a próbálkozások számát (30 * 10s = 5 perc ablak)
      start_period: 180s   # Adunk neki 3 perc tiszta türelmi időt, amíg a healthcheck el sem kezdi hibának venni az indul

volumes:
  sqldata:
