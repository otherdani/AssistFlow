services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Add cache optimization
      cache_from:
        - assist-flow:latest
    container_name: assist-flow
    restart: unless-stopped
    ports:
      - "${PORT}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      SESSION_SECRET: "${SESSION_SECRET}"
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SQL_SERVER: sqlserver
      SQL_PORT: "${SQL_PORT}"
      SQL_DATABASE: "${SQL_DATABASE}"
      SQL_USER: "${SQL_USER}"
      SQL_PASSWORD: "${SQL_PASSWORD}"
      SQL_ENCRYPT: "${SQL_ENCRYPT}"
      SQL_TRUST_CERT: "${SQL_TRUST_CERT}"
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: assist-flow-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SQL_PASSWORD}' -Q 'SELECT 1' -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s

volumes:
  sqldata:
